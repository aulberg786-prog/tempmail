kind = "web"
previewPath = "/"
title = "Gulberg AI Temp Mail"
version = "1.0.0"
id = "artifacts/gulberg-temp-mail"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26028

[services.development]
run = "pnpm --filter @workspace/gulberg-temp-mail run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gulberg-temp-mail", "run", "build" ]
serve = "static"
publicDir = "artifacts/gulberg-temp-mail/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26028"
BASE_PATH = "/"
